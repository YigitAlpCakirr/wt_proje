<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="still.css">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img class="img-fluid logo" src="Resimler/logo2.png" alt=""></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link" href="index.html">Anasayfa</a></li>
                    <li class="nav-item"><a class="nav-link active" href="iletisim.html">İletişim</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div id="app">
        <div class="container" style="margin-top: 120px; margin-bottom: 50px;">
            <h1 class="sayfa-baslik text-center mb-5">Bana Ulaşın</h1>
            
            <div class="row align-items-center modern-card p-5">
                <div class="col-md-7">
                    <h4 class="mb-4">Mesaj Gönder</h4>
                    
                    <div v-if="hataMesaji" class="alert alert-danger" id="hataKutusu">{{ hataMesaji }}</div>

                    <form id="iletisimForm" action="iletisim.php" method="POST" ref="form">
                        
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad (Text)</label>
                            <input type="text" id="ad" name="ad" v-model="formData.ad" class="form-control" placeholder="Adınız">
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">E-Posta (Email)</label>
                            <input type="text" id="email" name="email" v-model="formData.email" class="form-control" placeholder="ornek@mail.com">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Telefon (Sadece Rakam)</label>
                            <input type="text" id="telefon" name="telefon" v-model="formData.telefon" class="form-control" placeholder="05554443322">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Konu Seçimi (Select)</label>
                            <select id="konu" name="konu" v-model="formData.konu" class="form-select">
                                <option value="">Bir konu seçiniz...</option>
                                <option value="Is">İş Teklifi</option>
                                <option value="Proje">Proje İşbirliği</option>
                                <option value="Diger">Diğer</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Cinsiyet (Radio)</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="erkek" value="Erkek" v-model="formData.cinsiyet">
                                <label class="form-check-label" for="erkek">Erkek</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="cinsiyet" id="kadin" value="Kadin" v-model="formData.cinsiyet">
                                <label class="form-check-label" for="kadin">Kadın</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mesajınız (Textarea)</label>
                            <textarea id="mesaj" name="mesaj" v-model="formData.mesaj" class="form-control" rows="3"></textarea>
                        </div>

                        <div class="mb-4 form-check">
                            <input type="checkbox" class="form-check-input" id="onay" name="onay" v-model="formData.onay">
                            <label class="form-check-label" for="onay">Verilerimin işlenmesini onaylıyorum (Checkbox)</label>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-start">
                            <button type="button" class="btn btn-outline-primary px-4" onclick="validateNative()">Native JS ile Gönder</button>
                            <button type="button" class="btn btn-custom px-4" @click="validateVue">Vue.js ile Gönder</button>
                        </div>
                    </form>
                </div>
                <div class="col-md-5 text-center">
                    <img src="Resimler/mail.png" class="img-fluid" style="max-height: 300px;">
                    <p class="mt-3 text-muted">7/24 Mail yoluyla ulaşabilirsiniz.</p>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer text-center"><p>&copy; 2024 İletişim.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>

        function validateNative() {
            const ad = document.getElementById('ad').value.trim();
            const email = document.getElementById('email').value.trim();
            const telefon = document.getElementById('telefon').value.trim();
            const konu = document.getElementById('konu').value;
            const mesaj = document.getElementById('mesaj').value.trim();
            const cinsiyet = document.querySelector('input[name="cinsiyet"]:checked');
            const onay = document.getElementById('onay').checked;
            
            const hataKutusu = document.getElementById('hataKutusu') || document.createElement('div');
            hataKutusu.id = 'hataKutusu';
            hataKutusu.className = 'alert alert-danger mt-3';

            if(!ad || !email || !telefon || !konu || !mesaj || !cinsiyet) {
                hataKutusu.innerText = "Lütfen tüm alanları doldurunuz (Native JS Kontrolü).";
                document.getElementById('iletisimForm').prepend(hataKutusu);
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if(!emailRegex.test(email)) {
                hataKutusu.innerText = "Geçerli bir E-posta adresi giriniz (Native JS Kontrolü).";
                document.getElementById('iletisimForm').prepend(hataKutusu);
                return;
            }

            // Sadece Rakam Kontrolü
            const telefonRegex = /^[0-9]+$/;
            if(!telefonRegex.test(telefon)) {
                hataKutusu.innerText = "Telefon numarası sadece rakamlardan oluşmalıdır (Native JS Kontrolü).";
                document.getElementById('iletisimForm').prepend(hataKutusu);
                return;
            }

            if(!onay) {
                hataKutusu.innerText = "Lütfen onay kutusunu işaretleyiniz (Native JS Kontrolü).";
                document.getElementById('iletisimForm').prepend(hataKutusu);
                return;
            }

            document.getElementById('iletisimForm').submit();
        }

        const { createApp } = Vue;

        createApp({
            data() {
                return {
                    formData: {
                        ad: '',
                        email: '',
                        telefon: '',
                        konu: '',
                        cinsiyet: '',
                        mesaj: '',
                        onay: false
                    },
                    hataMesaji: ''
                }
            },
            methods: {
                validateVue() {
                    this.hataMesaji = '';
                    
                    if(!this.formData.ad || !this.formData.email || !this.formData.telefon || !this.formData.konu || !this.formData.mesaj || !this.formData.cinsiyet) {
                        this.hataMesaji = "Lütfen tüm alanları doldurunuz (Vue.js Kontrolü).";
                        return;
                    }

                    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                    if(!emailRegex.test(this.formData.email)) {
                        this.hataMesaji = "Geçerli bir E-posta adresi giriniz (Vue.js Kontrolü).";
                        return;
                    }

                    const telefonRegex = /^[0-9]+$/;
                    if(!telefonRegex.test(this.formData.telefon)) {
                        this.hataMesaji = "Telefon numarası sadece rakamlardan oluşmalıdır (Vue.js Kontrolü).";
                        return;
                    }

                    if(!this.formData.onay) {
                        this.hataMesaji = "Lütfen onay kutusunu işaretleyiniz (Vue.js Kontrolü).";
                        return;
                    }

                    // Hata yoksa DOM üzerindeki formu gönder
                    this.$refs.form.submit();
                }
            }
        }).mount('#app');
    </script>
</body>
</html>

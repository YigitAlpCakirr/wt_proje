    <script>
        AOS.init();

        async function fetchCharacters() {
            const container = document.getElementById('api-container');
            
            // Yükleniyor Efekti
            container.innerHTML = `
                <div class="col-12 text-center mt-5">
                    <div class="spinner-grow text-success" role="status"></div>
                    <div class="spinner-grow text-info" role="status"></div>
                    <div class="spinner-grow text-warning" role="status"></div>
                    <h3 class="mt-3 text-light" style="font-family: 'Creepster'">Veriler Yükleniyor...</h3>
                </div>`;

            try {
               
                const randomIds = Array.from({length: 4}, () => Math.floor(Math.random() * 826) + 1);
                
                const response = await fetch(`https://rickandmortyapi.com/api/character/${randomIds}`);
                const data = await response.json();

                container.innerHTML = ''; 

                
                const characters = Array.isArray(data) ? data : [data];

                characters.forEach((char, index) => {
                    let statusClass = 'unknown';
                    if(char.status === 'Alive') statusClass = 'alive';
                    if(char.status === 'Dead') statusClass = 'dead';

                    const cardHTML = `
                        <div class="col-md-6 col-lg-3 mb-4" data-aos="fade-up" data-aos-delay="${index * 150}">
                            <div class="rm-card">
                                <img src="${char.image}" alt="${char.name}">
                                <div class="rm-content">
                                    <h2 class="rm-name">${char.name}</h2>
                                    
                                    <div class="d-flex align-items-center mb-3">
                                        <span class="status-dot ${statusClass}"></span>
                                        <span style="font-weight:bold; font-size:1.1rem;">
                                            ${char.status} - ${char.species}
                                        </span>
                                    </div>

                                    <div class="info-label">Son Görülen Konum:</div>
                                    <div class="info-value text-truncate">${char.location.name}</div>

                                    <div class="info-label">Köken (Origin):</div>
                                    <div class="info-value text-truncate">${char.origin.name}</div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += cardHTML;
                });

            } catch (error) {
                console.error('Hata:', error);
                container.innerHTML = '<div class="alert alert-danger w-100 text-center">Portal Silahı Bozuldu! (API Hatası)</div>';
            }
        }

        window.onload = fetchCharacters;
    </script>

    <link rel="stylesheet" href="still.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            overflow: hidden;
            border: none;
        }
        .login-header {
            background: var(--primary-color, #007bff);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .login-body {
            padding: 40px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg fixed-top">
        <div class="container">
            <a class="navbar-brand" href="index.html"><img class="img-fluid logo" src="Resimler/logo2.png" alt=""></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">

            </div>
        </div>
    </nav>

    <div class="container" style="margin-top: 120px; margin-bottom: 50px;">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5" data-aos="zoom-in">
                <div class="card login-card">
                    <div class="login-header">
                        <h2><i class="fa-solid fa-user-lock"></i> Sisteme Giriş</h2>
                        <p class="mb-0">Öğrenci bilgilerinizle giriş yapın</p>
                    </div>
                    <div class="login-body">
                        
                        <div id="errorBox" class="alert alert-danger d-none"></div>

                        <form id="loginForm" action="login.php" method="POST">
                            <div class="mb-4">
                                <label class="form-label text-muted fw-bold">Öğrenci E-Posta Adresi</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-envelope"></i></span>
                                    <input type="text" id="email" name="email" class="form-control" placeholder="b2412100001@sakarya.edu.tr">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted fw-bold">Şifre (Öğrenci Numarası)</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fa-solid fa-lock"></i></span>
                                    <input type="password" id="sifre" name="sifre" class="form-control" placeholder="b2412100001">
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fs-5 rounded-pill shadow-sm">Giriş Yap <i class="fa-solid fa-arrow-right-to-bracket ms-2"></i></button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // URL'den hata mesajı kontrolü (PHP'den gelen yönlendirme için)
        const urlParams = new URLSearchParams(window.location.search);
        const errorType = urlParams.get('error');
        const errorBox = document.getElementById('errorBox');

        if (errorType === 'empty') {
            errorBox.innerText = "Sunucu Hatası: Lütfen tüm alanları doldurun.";
            errorBox.classList.remove('d-none');
        } else if (errorType === 'wrong') {
            errorBox.innerText = "Hatalı e-posta veya şifre girdiniz!";
            errorBox.classList.remove('d-none');
        } else if (errorType === 'invalid_format') {
            errorBox.innerText = "E-posta sakarya.edu.tr uzantılı olmalıdır.";
            errorBox.classList.remove('d-none');
        }

        // Form Submit JS Kontrolü
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const email = document.getElementById('email').value.trim();
            const sifre = document.getElementById('sifre').value.trim();
            
            errorBox.classList.add('d-none'); // Önceki hataları gizle

            // 1. Boş Alan Kontrolü
            if (email === '' || sifre === '') {
                e.preventDefault();
                errorBox.innerText = "Lütfen e-posta ve şifre alanlarını boş bırakmayınız.";
                errorBox.classList.remove('d-none');
                return;
            }

            // 2. Email Format Kontrolü (Genel Email formatı Regex'i)
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                e.preventDefault();
                errorBox.innerText = "Lütfen geçerli bir e-posta adresi giriniz.";
                errorBox.classList.remove('d-none');
                return;
            }
        });
    </script>
</body>
</html>
